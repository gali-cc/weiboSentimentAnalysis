{% extends 'base.html' %}
{% block title %}微博舆情分析{% endblock %}
{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">微博舆情分析</h4>
                        </div>
                        <div class="header-action">
                            <i data-toggle="collapse" data-target="#datatable-1" aria-expanded="false">
                                <svg width="20" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24"
                                     stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                                </svg>
                            </i>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">热词情感趋势柱状图</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="hotWordBarChart" data-x-sentiment='{{ xCommentSentimentData|tojson|safe }}'
                         data-y-sentiment='{{ yCommentSentimentData|tojson|safe }}'
                         style="width:100%;height:450px">

                        </div>
                    </div>
                </div>

            </div>
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">热词情感趋势树形图</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="hotWordTreeChart" data-x-sentiment='{{ xCommentSentimentData|tojson|safe }}' 
                        data-y-sentiment='{{ yCommentSentimentData|tojson|safe }}'  
                         style="width:100%;height:450px">

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">文章内容和评论舆情趋势饼状图</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="sentimentPieChart" 
                         data-article-sentiment='{{ artticleHotWordSentmentList|tojson|safe }}'
                         data-comment-sentiment='{{ commentHotWordSentmentList|tojson|safe }}'
                         style="width:100%;height:450px">

                        </div>
                    </div>
                </div>

            </div>
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">热词Top15</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="hotWordTop15Chart" 
                         data-x-hotword='{{ xHotWordTop15Data|tojson|safe }}'
                         data-y-hotword='{{ yHotWordTop15Data|tojson|safe }}'
                         style="width:100%;height:450px">

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
{% endblock %}

{% block echarts %}
    <script>
        // 获取容器元素
        var barChart = document.getElementById('hotWordBarChart');

        // 初始化 ECharts 实例
        var myChart = echarts.init(barChart);

        // 自定义颜色方案
        var colors = ['#66CC99', '#FFCC66', '#FF6666'];

        // 获取数据
        var xCommentSentimentData = JSON.parse(barChart.dataset.xSentiment);
        var yCommentSentimentData = JSON.parse(barChart.dataset.ySentiment);



        // 配置柱状图选项
        var option = {
            title: {
                text: '情感分析'
            },
            tooltip: {
                trigger: 'item',
                formatter: '{a} <br/>{b}: {c} (个)'
            },
            legend: {},
            xAxis: {
                type: 'category',
                data: xCommentSentimentData,
                axisLabel: {
                    color: '#333' // 设置 x 轴刻度标签颜色
                }
            },
            yAxis: {
                type: 'value',
                axisLabel: {
                    color: '#333' // 设置 y 轴刻度标签颜色
                }
            },
            series: [
                {
                    name: '情感数量',
                    type: 'bar',

                    data: yCommentSentimentData,
                    itemStyle: {
                        color: function (params) {
                            return colors[params.dataIndex % colors.length];
                        }
                    },
                    animation: true,  // 启用动画效果
                    animationDuration: 1000,  // 动画持续时间（毫秒）
                    animationEasing: 'elasticOut',  // 动画缓动函数
                    emphasis: {
                        itemStyle: {
                            color: '#3398DB'  // 高亮显示的颜色
                        }
                    }
                }
            ]
        };

        // 使用配置项显示柱状图
        myChart.setOption(option);

    </script>
    <script>
        // 获取容器元素
        var treeChart = document.getElementById('hotWordTreeChart');

        // 初始化 ECharts 实例
        var myChart = echarts.init(treeChart);

        // 自定义颜色方案
        var colors = ['#66CC99', '#FFCC66', '#FF6666'];

        // 获取数据
        var xCommentSentimentData = JSON.parse(treeChart.dataset.xSentiment);
        var yCommentSentimentData = JSON.parse(treeChart.dataset.ySentiment);
        treeData = []
        for (var i = 0; i < xCommentSentimentData.length; i++) {
            treeData[i] = {
                name: xCommentSentimentData[i],
                value: yCommentSentimentData[i]
            }
        }

        // 配置树形图选项
        option = {
            series: [
                {
                type: 'treemap',
                data: treeData,
                }
            ]
        };

        option && myChart.setOption(option);
    </script>
    <script>
        var chartDom = document.getElementById('sentimentPieChart');
        var myChart = echarts.init(chartDom);
        var option;
        // 获取数据
        var articleSentimentData = JSON.parse(chartDom.dataset.articleSentiment);
        var commentSentimentData = JSON.parse(chartDom.dataset.commentSentiment);

        option = {
        tooltip: {
            trigger: 'item',
            formatter: '{a} <br/>{b}: {c} ({d}%)'
        },
        legend: {
            data: commentSentimentData.map(item => item.name)
        },
        series: [
            {
            name: '微博评论情感',
            type: 'pie',
            selectedMode: 'single',
            radius: [0, '30%'],
            label: {
                position: 'inner',
                fontSize: 14
            },
            labelLine: {
                show: false
            },
            data: commentSentimentData
            },
            {
            name: '微博文章情感',
            type: 'pie',
            radius: ['45%', '60%'],
            labelLine: {
                length: 30
            },
            label: {
                formatter: '{a|{a}}{abg|}\n{hr|}\n  {b|{b}：}{c}  {per|{d}%}  ',
                backgroundColor: '#F6F8FC',
                borderColor: '#8C8D8E',
                borderWidth: 1,
                borderRadius: 4,
                rich: {
                a: {
                    color: '#6E7079',
                    lineHeight: 22,
                    align: 'center'
                },
                hr: {
                    borderColor: '#8C8D8E',
                    width: '100%',
                    borderWidth: 1,
                    height: 0
                },
                b: {
                    color: '#4C5058',
                    fontSize: 14,
                    fontWeight: 'bold',
                    lineHeight: 33
                },
                per: {
                    color: '#fff',
                    backgroundColor: '#4C5058',
                    padding: [3, 4],
                    borderRadius: 4
                }
                }
            },
            data: articleSentimentData
            }
        ]
        };

        option && myChart.setOption(option);

    </script>

    <script>
        var chartDom = document.getElementById('hotWordTop15Chart');
        var myChart = echarts.init(chartDom);
        var option;

        // 获取数据
        var xHotWordTop15Data = JSON.parse(chartDom.dataset.xHotword);
        var yHotWordTop15Data = JSON.parse(chartDom.dataset.yHotword);

        option = {
            title: {
                text: '微博评论热词Top15'
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'shadow'
                }
            },

            legend: {},
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'value',
                boundaryGap: [0, 0.01]
            },
            yAxis: {
                type: 'category',
                data: xHotWordTop15Data
            },
            series: [
                {
                    name: '热词出现次数',
                    type: 'bar',
                    data: yHotWordTop15Data
                }
            ]
        };

        option && myChart.setOption(option);
    </script>
{% endblock %}
